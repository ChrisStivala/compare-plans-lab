<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Compare energy plans | Origin Energy</title>
<style>
@font-face{font-family:gordita;src:url('project/fonts/gorditaregular-webfont.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:gordita;src:url('project/fonts/gorditamedium-webfont.woff2') format('woff2');font-weight:500 600;font-display:swap}
@font-face{font-family:gordita;src:url('project/fonts/gorditabold-webfont.woff2') format('woff2');font-weight:700;font-display:swap}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:#dfe1e3;font-family:gordita,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.cp-scroll{scrollbar-width:none}
.cp-scroll::-webkit-scrollbar{display:none}
.cp-input::placeholder{color:#909090;font-weight:700;opacity:1}
cp-icon{display:inline-flex;line-height:0}
img,svg,cp-icon{-webkit-user-drag:none;user-drag:none;-webkit-user-select:none;user-select:none}
a{color:#232323}
button{font-family:inherit}
.cp-link{text-decoration:underline dotted;text-decoration-color:#C4C4C4;text-decoration-thickness:1.4px;text-underline-offset:3px;cursor:pointer;transition:color .15s ease,text-decoration-color .15s ease}
.cp-link:hover{color:#1A73E8 !important;text-decoration-color:#1A73E8}
@keyframes cpFade{from{opacity:0}to{opacity:1}}
@keyframes cpFadeOut{from{opacity:1}to{opacity:0}}
@keyframes cpDrop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cpPop{0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes cpSlideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes cpSlideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
@keyframes cpCardIn{0%{opacity:0;transform:translateY(32px);margin-left:calc(-1 * var(--cw,308px))}55%{opacity:1}100%{opacity:1;transform:translateY(0);margin-left:0}}
@keyframes cpCardOut{0%{opacity:1;transform:translateY(0);margin-left:0}35%{opacity:0}100%{opacity:0;transform:translateY(28px);margin-left:calc(-1 * var(--cw,308px))}}
@keyframes cpModalIn{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cpModalOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(16px) scale(.98)}}
</style>
<link rel="preload" as="image" href="project/assets/everyday-rewards.png">
<link rel="preload" as="image" href="project/assets/comfy-credits.png">
<link rel="preload" as="image" href="project/assets/pictogram-offer.svg">
<link rel="preload" as="image" href="project/assets/pictogram-bolt.svg">
<link rel="preload" as="image" href="project/assets/pictogram-solar.svg">
<link rel="preload" as="image" href="project/assets/pictogram-battery.svg">
<link rel="preload" as="image" href="project/assets/pictogram-night.svg">
<script src="project/components/cp-icon.js"></script>
</head>
<body>
<div id="root"></div>
<div id="modal-layer"></div>
<script>
(function(){
'use strict';

/* ── Data ───────────────────────────────────────────────────── */
const EST='Estimated cost inc GST for a small business using 4000 kWh / yearly on a Single rate tariff in the United Energy network.';
const GEST='Estimated cost inc GST for a small business using 3500MJ / yearly on a Single rate tariff in the United Energy network.';
const CAL={icon:'Calendar',text:'Variable rates with ongoing benefit period',modal:'variable'};
const GP={icon:'GreenPower',text:'100% GreenPower electricity',modal:'greenpower'};
const EVP={icon:'EVPowerup',text:'8c/kWh EV charging for compatible vehicles',modal:'ev'};

const BASE_PLANS=[
  {id:'go',name:'Origin Go Variable',tagline:'For homes who want everyday low prices.',
   discount:'8',ref:'$2,411',yearly:'$2,218',gasYearly:'$1,386',
   tag:'Most popular',tagColor:'#D44500',
   includedTitle:"What’s included with Origin Go Variable.",
   included:[{icon:'Promo',text:'Everyday low variable electricity rates',modal:'goVar'},CAL],
   addable:[GP,EVP]},
  {id:'edr',isLogo:true,name:'Origin Everyday Rewards Variable',tagline:'Save on your next shop by earning Everyday Rewards points.',
   discount:'4',ref:'$2,411',yearly:'$2,314',gasYearly:'$1,494',
   includedTitle:"What’s included with Origin Everyday Rewards Variable.",
   included:[{icon:'BoxedReward',text:'Earn up to 10,000 Everyday Rewards Points',modal:'edr'},CAL],
   addable:[GP,EVP]},
  {id:'wd',name:'Origin Weekday Shift',tagline:'Off-peak electricity rates on weekdays, 9am–5pm.',
   discount:'17',ref:'$2,411',yearly:'$1,995',gasYearly:'$2,218',
   includedTitle:"What’s included with Origin Weekday Shift.",
   included:[{icon:'TOU',text:'Half price electricity weekdays 9am–5pm',modal:'weekday'},CAL],
   addable:[GP]}
];

const ADDON_PLANS={
  Solar:{id:'solar',name:'Origin Solar Boost',tagline:'Get more from your solar panels with a boosted FIT (up to 8c/kWh)',
    discount:'0',ref:'$2,411',yearly:'$2,411',gasYearly:'$2,218',
    includedTitle:"What’s included with Origin Solar Boost.",
    included:[{icon:'Solar',text:'Get a boosted FIT for your solar generation',modal:'solar'},CAL],
    addable:[GP,EVP]},
  EV:{id:'night',name:'Origin Night Shift',tagline:'Off-peak electricity rates for charging your EV overnight.',
    discount:'1',ref:'$2,411',yearly:'$2,377',gasYearly:'$2,218',
    tag:'Bring any EV',tagColor:'#FF6024',
    includedTitle:"What’s included with Origin Night Shift.",
    included:[{icon:'EVCharge',text:'Fully charge your EV from $5 with 8c/kWh overnight',modal:'night'},CAL],
    addable:[GP]},
  Battery:{id:'battery',name:'Origin Battery IQ',tagline:'Power your home with 4 free hours of power a day.',
    discount:'10',ref:'$2,411',yearly:'$1,497',gasYearly:'$2,218',
    tag:'Just launched',tagColor:'#FF6024',
    includedTitle:"What’s included with Origin Battery IQ.",
    included:[{icon:'Bolt',text:'4 hours of 0c/kWh rates a day plus a higher evening FIT',modal:'battery'},CAL],
    addable:[GP]}
};

const MODALS={
  variable:{icon:'Calendar',title:'Variable rates with ongoing benefit period',body:[
    {h:'Variable rates'},{p:"A variable rate means what you pay for energy could go up or down. Origin may change prices from time to time – we'll always let you know."},
    {h:'Ongoing benefit period'},{p:'The benefits of this plan will not expire after any period, and you do not need to renew this plan to continue to receive these benefits.'}]},
  goVar:{icon:'Promo',title:'Everyday low variable electricity rates',body:[
    {p:'Enjoy discounted energy rates year round, on a flat rate tariff.'},
    {p:'Simple and easy to get going, no need to worry about prices changing during the day.'},
    {h:'Up to $200 in bill credits'},
    {p:'Get up to $200 (inc. GST) in bill credits — $100 each for electricity and natural gas when you sign up online and stay until 30 June 2026.'},
    {l:['New or moving residential customers only.','Available in NSW, SA and VIC.',"Not available if you've had a credit for the same fuel and address in the last 12 months."]},
    {p:'The credit is applied if your plan is still active on 30 June 2026.'}]},
  credit:{icon:'Promo',title:'Get $100 in bill credits for each fuel',body:[
    {p:'Get up to $200 (inc. GST) in bill credits — $100 each for electricity and natural gas when you sign up online and stay until 30 June 2026.'},
    {h:'Eligibility'},{l:['New or moving residential customers only.','Available in NSW, SA and VIC.',"Not available if you've had a credit for the same fuel and address in the last 12 months."]},
    {h:'How it works'},{p:'The credit is applied if your plan is still active on 30 June 2026.'}]},
  edr:{icon:'BoxedReward',title:'Earn up to 10,000 Everyday Rewards Points',body:[
    {p:'Get points for signing up:'},{l:['New customers get 5,000 points for electricity and 5,000 points for gas.','Renewing customers get 2,500 points for electricity and 2,500 points for gas.']},
    {p:'Plus, collect 1 point for every $1 you spend on your usage and supply (incl GST).'},
    {p:"You'll need your Everyday Rewards number to sign up."}]},
  weekday:{icon:'TOU',title:'Half price electricity, weekdays 9am–5pm',body:[
    {p:'Currently, the variable off-peak rate from 9am-5pm Monday to Friday is half-price compared to peak rates on this plan*'},
    {l:['Ideal for those who use the most electricity on weekdays','Great for running appliances from 9am to 5pm weekdays','Suits those who can shift electricity use to weekdays']},
    {p:"You'll need a smart meter to sign up for Origin Shift"}]},
  greenpower:{icon:'GreenPower',title:'100% GreenPower electricity',body:[
    {p:'Origin will source electricity from GreenPower accredited renewable sources to match 100% of your electricity usage.'}]},
  ev:{icon:'EVPowerup',title:'8c/kWh EV charging for compatible vehicles',body:[
    {p:'$5 EV full charge estimate is based on a continuous electricity charge rate of 8c/kWh powering a Tesla Model Y or Tesla Model 3 with a useable 57.5 kWh battery.'},
    {p:'Origin EV Power Up beta is our automated electric vehicle charging solution that unlocks a lean, EV-exclusive rate of 8c/kWh for scheduled charge sessions in the Origin app.'}]},
  solar:{icon:'Solar',title:'Get a boosted FIT for your solar generation',body:[
    {p:'Let your solar deliver more value with our Solar Boost plan!'},
    {p:"Get ready to export more energy to the grid and reduce your energy bills."}]},
  night:{icon:'EVCharge',title:'Fully charge your EV from $5 with 8c/kWh overnight',body:[
    {p:'Currently, the variable off-peak electricity rate from 12am-6am every night is 8c/kWh*'},
    {l:['Make the most of off peak electricity rates at night to charge your EV','Great for scheduling EV charging or appliances to run overnight','Ideal for those who use the most electricity from 12am-6am']},
    {p:"You'll need a smart meter to sign up for Origin Shift"}]},
  battery:{icon:'Bolt',title:'4 hours of 0c/kWh rates a day plus a higher evening FIT',body:[
    {p:'Time to let your battery start working for you'},
    {p:'The plan built for homes with batteries - 4 free hours of electricity a day and super peak exports rates.'},
    {l:['Charge your battery with 4 hours free electricity 11am-2pm and 2-3am* every day','Earn 33c kWh for exports between 6-9pm every day*','Stay in full control without complicated setups']}]}
};

const SUGGESTIONS=['6 Nerli Street, Abbotsbury NSW 2176','6 Nerli Place, Abbotsbury NSW 2176','16 Nerli Street, Abbotsbury NSW 2176','26 Nerli Street, Prestons NSW 2170'];

/* ── State ──────────────────────────────────────────────────── */
const S={
  fuel:'Electricity',
  addons:{Solar:false,EV:false,Battery:false},
  ratesOpen:false,gasRatesOpen:false,
  activeModal:null,modalClosing:false,
  searchPhase:'idle',searchValue:'',
  car:{left:0,max:0,idx:0,n:0,cw:0,sw:0},
  vw:window.innerWidth,
  entering:{},exiting:{},gasInstant:false
};

/* ── Layout ─────────────────────────────────────────────────── */
function L(){
  const vw=S.vw,isMobile=vw<768,isTablet=vw>=768&&vw<1200,isDesktop=vw>=1200,isWide=vw>=768;
  const cpv=isDesktop?3.5:2.5,cgap=isWide?16:8;
  const tb=isDesktop?1280:Math.min(1280,vw-80);
  const cw=Math.round((tb-Math.floor(cpv)*cgap)/cpv);
  const TRACK=isDesktop?(4*cw+3*cgap):1280;
  const trackMax=isWide?(TRACK+'px'):'1080px';
  return{vw,isMobile,isTablet,isDesktop,isWide,cpv,cgap,cw,TRACK,trackMax};
}

/* ── Plan list ──────────────────────────────────────────────── */
function activePlans(){
  const{fuel,addons,exiting}=S;
  let plans=BASE_PLANS.map(p=>({...p,included:[...p.included],addable:[...p.addable]}));
  ['Solar','EV','Battery'].forEach(k=>{
    const xid={Solar:'solar',EV:'night',Battery:'battery'}[k];
    if(addons[k]||(exiting&&exiting[xid])) plans.unshift({...ADDON_PLANS[k],included:[...ADDON_PLANS[k].included],addable:[...ADDON_PLANS[k].addable]});
  });
  if(fuel==='Gas') plans=plans.filter(p=>p.id==='go'||p.id==='edr'||(exiting&&exiting[p.id]));
  return plans;
}

/* ── Card HTML ──────────────────────────────────────────────── */
function perkRow(pk,rowH){
  const hasMod=!!pk.modal;
  const cls=hasMod?' class="cp-link"':'';
  const deco=hasMod?'':'text-decoration:none';
  return`<div${hasMod?` data-modal="${pk.modal}"`:''}style="display:flex;gap:12px;align-items:center;min-height:${rowH||48}px;cursor:${hasMod?'pointer':'default'}">
  <div style="width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center"><cp-icon name="${pk.icon}" size="24"></cp-icon></div>
  <span${cls} style="font-weight:400;font-size:14px;line-height:28px;color:#505050;${deco}">${pk.text}</span>
</div>`;
}

function cardHTML(plan,lo){
  const{fuel,ratesOpen,gasRatesOpen,exiting,entering,gasInstant}=S;
  const showElec=fuel!=='Gas',showGas=fuel!=='Electricity';
  const{isWide,cgap,cw}=lo;

  let{tag,tagColor,included}=plan;
  tag=tag||'';tagColor=tagColor||'#D44500';
  if(plan.id==='go'){tag='Bill credit offer';tagColor='#8D39F5';included=[{icon:'Promo',text:'Up to $200 in bill credits (conditions apply)',modal:'goVar'},included[1]];}

  const cWidth=isWide?(cw+'px'):'300px';
  const slotPx=isWide?(cw+cgap):308;
  const anim=(exiting&&exiting[plan.id])?'cpCardOut .34s cubic-bezier(.16,.84,.44,1) both'
    :(entering&&entering[plan.id])?'cpCardIn .58s cubic-bezier(.34,1.28,.5,1) both':'none';

  const gTrans=gasInstant?'none':'grid-template-rows .44s cubic-bezier(.4,0,.2,1),margin-top .44s cubic-bezier(.4,0,.2,1),opacity .3s ease';
  const gAccTrans=gasInstant?'none':'grid-template-rows .44s cubic-bezier(.4,0,.2,1),opacity .3s ease';
  const gGrid=showGas?'1fr':'0fr';
  const gMt=showGas?(showElec?'-16px':'0'):'-56px';
  const gOp=showGas?'1':'0';
  const rRows=ratesOpen?'1fr':'0fr',gRRows=gasRatesOpen?'1fr':'0fr';
  const rVbar=`scaleY(${ratesOpen?0:1})`,gRVbar=`scaleY(${gasRatesOpen?0:1})`;
  const inclPlanName=plan.includedTitle.replace(/^What.s included with\s+/i,'').replace(/\.\s*$/,'');
  // On narrow cards (mobile/tablet) the Go offer perk wraps to 3 lines, so every
  // perk row reserves a uniform height per breakpoint to keep cards aligned.
  // Tablet cards are narrowest (≈262px at 768px), where the Go offer still
  // wraps to 3 lines; mobile (300px) and desktop fit 2 lines, so use tight rows.
  const rowH=lo.isTablet?72:48;
  const addMin=rowH*2+16;
  // Price block → "What's included" should be 46px; the section container gap
  // is 32px (used for included → add-ons), so add the difference as margin.
  const incMt=18;
  // Reserve a 2-line title height on narrow cards so a wrapping plan name
  // (e.g. "Origin Everyday Rewards Variable") doesn't shift cards out of line.
  const titleMinH=62;

  let iconH='';
  if(plan.id==='edr') iconH=`<img src="project/assets/everyday-rewards.png" alt="Everyday Rewards" style="height:88px;width:106px;display:block">`;
  else if(plan.id==='go') iconH=`<img src="project/assets/pictogram-offer.svg" width="92" height="92" style="display:block">`;
  else if(plan.id==='wd') iconH=`<img src="project/assets/pictogram-bolt.svg" width="86" height="86" style="display:block">`;
  else if(plan.id==='solar') iconH=`<img src="project/assets/pictogram-solar.svg" width="92" height="92" style="display:block">`;
  else if(plan.id==='night') iconH=`<img src="project/assets/pictogram-night.svg" width="92" height="92" style="display:block">`;
  else if(plan.id==='battery') iconH=`<img src="project/assets/pictogram-battery.svg" width="92" height="92" style="display:block">`;

  const tagH=tag?`<span style="position:absolute;top:4px;right:24px;background:${tagColor};color:#fff;font-weight:700;font-size:13px;line-height:18px;padding:5px 11px;border-radius:16px 16px 16px 4px;white-space:nowrap">${tag}</span>`:'';
  const showAddons=showElec;
  const creditLink=plan.id==='go'?`<span data-modal="credit" class="cp-link" style="align-self:flex-start;font-weight:500;font-size:12px;line-height:20px;color:#797979">Price estimate excludes credits</span>`:'';

  return`<div data-plan-id="${plan.id}" style="scroll-snap-align:start;flex-shrink:0;width:${cWidth};--cw:${slotPx}px;border-radius:32px;background:#fff;border:1px solid transparent;padding:32px 16px;display:flex;flex-direction:column;gap:32px;animation:${anim}">
<div style="display:flex;flex-direction:column;gap:16px;align-items:center">
  <div style="height:96px;display:flex;align-items:center;justify-content:center;position:relative;width:100%">
    ${iconH}${tagH}
  </div>
  <div style="display:flex;flex-direction:column;align-items:center;padding:0 12px">
    <div style="min-height:48px;display:flex;align-items:center;justify-content:center;text-align:center"><span style="font-weight:700;font-size:16px;line-height:24px;color:#232323">${plan.name}</span></div>
    <div style="height:72px;padding-top:8px;text-align:center"><span style="font-weight:400;font-size:14px;line-height:24px;color:#505050">${plan.tagline}</span></div>
  </div>
</div>
<div style="display:flex;flex-direction:column;gap:32px">
  ${showElec?`<div style="border-radius:24px;background:#F6F6F6;padding:32px;display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-weight:500;font-size:16px;line-height:24px;color:#232323">Electricity</span>
      <div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center"><cp-icon name="Electricity" size="28"></cp-icon></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;align-items:baseline;gap:2px">
        <span style="font-weight:700;font-size:30px;line-height:34px;color:#232323">${plan.discount}</span>
        <span style="font-weight:700;font-size:16px;color:#232323">%</span>
      </div>
      <span style="font-weight:400;font-size:12px;line-height:20px;color:#505050">less than the ${plan.ref} reference price</span>
    </div>
    <div style="height:1px;background:rgba(0,0,0,.1)"></div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:flex-end;gap:4px">
        <span style="font-weight:700;font-size:24px;line-height:32px;color:#232323">${plan.yearly}</span>
        <span style="font-weight:700;font-size:14px;color:#232323;padding-bottom:3px">/year</span>
        <div style="width:18px;height:18px;color:#A0A0A0;display:flex;align-items:center;justify-content:center;padding-bottom:2px"><cp-icon name="Info" size="18"></cp-icon></div>
      </div>
      <span style="font-weight:400;font-size:12px;line-height:20px;color:#505050">${EST}</span>
      <div style="min-height:20px;margin-top:4px;display:flex">${creditLink}</div>
    </div>
  </div>`:''}
  <div data-gas-section style="display:grid;grid-template-rows:${gGrid};margin-top:${gMt};opacity:${gOp};transition:${gTrans}">
    <div style="overflow:hidden;min-height:0">
      <div style="border-radius:24px;background:#F6F6F6;padding:32px;display:flex;flex-direction:column;gap:16px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="font-weight:500;font-size:16px;line-height:24px;color:#232323">Natural Gas</span>
          <div style="width:28px;height:28px;display:flex;align-items:center;justify-content:center"><cp-icon name="Gas" size="28"></cp-icon></div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;align-items:flex-end;gap:4px">
            <span style="font-weight:700;font-size:24px;line-height:32px;color:#232323">${plan.gasYearly}</span>
            <span style="font-weight:700;font-size:14px;color:#232323;padding-bottom:3px">/year</span>
            <div style="width:18px;height:18px;color:#A0A0A0;display:flex;align-items:center;justify-content:center;padding-bottom:2px"><cp-icon name="Info" size="18"></cp-icon></div>
          </div>
          <span style="font-weight:400;font-size:12px;line-height:20px;color:#505050">${GEST}</span>
          <div style="min-height:20px;margin-top:4px;display:flex">${creditLink}</div>
        </div>
      </div>
    </div>
  </div>
  <div style="padding:0 12px;display:flex;flex-direction:column;gap:16px;margin-top:${incMt}px">
    <div style="display:flex;flex-direction:column;justify-content:flex-end;min-height:${titleMinH}px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="display:flex;flex-direction:column;gap:2px">
          <span style="font-weight:500;font-size:14px;line-height:20px;color:#232323">What's included with</span>
          <span style="font-weight:500;font-size:14px;line-height:20px;color:#232323">${inclPlanName}</span>
        </div>
        <div style="flex:1 1 16px;min-width:12px;height:1px;background:#D8D8D8"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">${included.map(p=>perkRow(p,rowH)).join('')}</div>
  </div>
  ${showAddons&&plan.addable&&plan.addable.length?`<div style="padding:0 12px;display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;align-items:center;gap:12px">
      <span style="font-weight:500;font-size:14px;line-height:20px;color:#232323;white-space:nowrap">Things you can add</span>
      <div style="flex:1 1 16px;min-width:12px;height:1px;background:#D8D8D8"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px;min-height:${addMin}px">${plan.addable.map(p=>perkRow(p,rowH)).join('')}</div>
  </div>`:''}
</div>
<div style="padding:0 16px">
  ${showElec?`<div style="border-top:1px solid #E3E3E3">
    <div data-action="toggle-rates" style="display:flex;align-items:center;justify-content:space-between;padding:24px 0;cursor:pointer">
      <span style="font-weight:500;font-size:14px;line-height:20px;color:#232323">Electricity rates</span>
      <div style="position:relative;width:22px;height:22px;flex-shrink:0">
        <span style="position:absolute;top:10px;left:2px;right:2px;height:2px;background:#232323;border-radius:1px"></span>
        <span data-elec-vbar style="position:absolute;left:10px;top:2px;bottom:2px;width:2px;background:#232323;border-radius:1px;transition:transform .25s ease;transform:${rVbar}"></span>
      </div>
    </div>
    <div data-elec-acc style="display:grid;transition:grid-template-rows .32s ease;grid-template-rows:${rRows}">
      <div style="overflow:hidden">
        <div style="display:flex;flex-direction:column;gap:24px;padding-bottom:24px">

/* ── Modal HTML ─────────────────────────────────────────────── */
function modalHTML(){
  const{activeModal,modalClosing}=S;
  if(!activeModal) return'';
  const m=MODALS[activeModal];
  if(!m) return'';
  const lo=L();
  const closing=modalClosing;
  const oAnim=closing?'cpFadeOut .3s cubic-bezier(.64,0,.78,.39) forwards':'cpFade .2s ease';
  const sAnim=lo.isWide
    ?(closing?'cpModalOut .22s cubic-bezier(.4,0,1,1) forwards':'cpModalIn .34s cubic-bezier(.22,.61,.36,1)')
    :(closing?'cpSlideDown .3s cubic-bezier(.64,0,.78,.39) forwards':'cpSlideUp .3s cubic-bezier(.22,.61,.36,1)');
  const overlayStyle=`position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.75);display:flex;flex-direction:column;align-items:center;justify-content:${lo.isWide?'center':'flex-end'};padding:${lo.isWide?'24px':'0'};box-sizing:border-box;animation:${oAnim}`;
  const sheetStyle=(lo.isWide
    ?'width:100%;max-width:640px;max-height:86vh;overflow-y:auto;background:#fff;border-radius:24px;padding:44px 48px;display:flex;flex-direction:column;gap:24px;box-sizing:border-box'
    :'width:100%;max-width:402px;max-height:90vh;overflow-y:auto;background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 40px;display:flex;flex-direction:column;gap:24px;box-sizing:border-box')+`;animation:${sAnim}`;

  const bodyHTML=m.body.map(b=>{
    if(b.h) return`<span style="font-weight:700;font-size:18px;line-height:26px;color:#232323;margin-top:4px">${b.h}</span>`;
    if(b.p) return`<span style="font-weight:400;font-size:16px;line-height:26px;color:#505050">${b.p}</span>`;
    if(b.l) return`<ul style="margin:0;padding-left:22px;display:flex;flex-direction:column;gap:12px">${b.l.map(it=>`<li style="font-weight:400;font-size:16px;line-height:26px;color:#505050">${it}</li>`).join('')}</ul>`;
    return'';
  }).join('');

  return`<div id="modal-overlay" style="${overlayStyle}">
  <div id="modal-sheet" style="${sheetStyle}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div style="width:48px;height:48px;display:flex;align-items:center;justify-content:flex-start">
        <cp-icon name="${m.icon}" size="44"></cp-icon>
      </div>
      <div id="modal-close" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#232323" stroke-width="2" stroke-linecap="round"><path d="M5 5 L19 19 M19 5 L5 19"></path></svg>
      </div>
    </div>
    <span style="font-weight:700;font-size:28px;line-height:34px;color:#232323;letter-spacing:-.01em;text-wrap:balance">${m.title}</span>
    <div style="display:flex;flex-direction:column;gap:16px">${bodyHTML}</div>
  </div>
</div>`;
}

/* ── Counts ─────────────────────────────────────────────────── */

  const plans=activePlans();
  const n=plans.length,noun=n===1?'plan':'plans';
  const{fuel,addons}=S;
  const active=['Solar','EV','Battery'].filter(k=>addons[k]);

  else{
    const map={Solar:'solar',EV:'EV',Battery:'battery'};
    const names=active.map(k=>map[k]);
    const joined=names.length===1?names[0]:names.length===2?names[0]+' & '+names[1]:names.slice(0,-1).join(', ')+' & '+names[names.length-1];

  }

let _fuelExitTimer,_gasInstTimer,_enterClrTimer;
function selectFuel(name){
  const from=S.fuel;
  if(name===from) return;
  const addonIds=['Solar','EV','Battery'].filter(k=>S.addons[k]).map(k=>({Solar:'solar',EV:'night',Battery:'battery'})[k]);
  if(name==='Gas'){
    const leaving=['wd',...addonIds];
    const ex={...S.exiting};leaving.forEach(id=>ex[id]=true);
    S.fuel=name;S.exiting=ex;S.gasInstant=true;
    updateAll();
    clearTimeout(_fuelExitTimer);
    _fuelExitTimer=setTimeout(()=>{const ex2={...S.exiting};leaving.forEach(id=>delete ex2[id]);S.exiting=ex2;updateCarousel();},340);
    clearTimeout(_gasInstTimer);
    _gasInstTimer=setTimeout(()=>{S.gasInstant=false;},60);
  } else if(from==='Gas'){
    const incoming=['wd',...addonIds];
    const en={...S.entering};incoming.forEach(id=>en[id]=true);
    S.fuel=name;S.entering=en;S.gasInstant=true;
    updateAll();
    clearTimeout(_enterClrTimer);
    _enterClrTimer=setTimeout(()=>{const en2={...S.entering};incoming.forEach(id=>delete en2[id]);S.entering=en2;updateCarousel();},600);
    clearTimeout(_gasInstTimer);
    _gasInstTimer=setTimeout(()=>{S.gasInstant=false;},60);
  } else {
    S.fuel=name;
    updateCarousel();
    updateGasStyles();
  }

  positionThumb(true);
}

/* ── Addon toggle ───────────────────────────────────────────── */
let _exitTimers={},_enterTimers={},_exitRafs={};
function toggleAddon(name){
  const id={Solar:'solar',EV:'night',Battery:'battery'}[name];
  const isOn=!!S.addons[name];
  clearTimeout(_exitTimers[id]);delete _exitTimers[id];
  clearTimeout(_enterTimers[id]);delete _enterTimers[id];
  cancelAnimationFrame(_exitRafs[id]);delete _exitRafs[id];

  if(!isOn){
    const ex={...S.exiting};delete ex[id];
    S.addons={...S.addons,[name]:true};
    S.entering={...S.entering,[id]:true};
    S.exiting=ex;
    updateCarousel();updateAddonFilters();
    // New card is inserted at the front; scroll the carousel to it so the
    // swoop-in animation is in frame (especially on mobile when scrolled over).
    if(_car) smoothScrollX(_car,0,520);
    _enterTimers[id]=setTimeout(()=>{delete _enterTimers[id];const en={...S.entering};delete en[id];S.entering=en;},600);
  } else {
    const en={...S.entering};delete en[id];
    S.addons={...S.addons,[name]:false};
    S.exiting={...S.exiting,[id]:true};
    S.entering=en;
    updateCarousel();updateAddonFilters();
    _exitTimers[id]=setTimeout(()=>{delete _exitTimers[id];const ex={...S.exiting};delete ex[id];S.exiting=ex;updateCarousel();},340);
  }
}

/* ── Carousel scroll/drag ───────────────────────────────────── */
let _scrollRaf,_carRaf;
function smoothScrollX(el,target,dur){
  cancelAnimationFrame(_scrollRaf);
  const max=el.scrollWidth-el.clientWidth;
  target=Math.max(0,Math.min(target,max));
  const start=el.scrollLeft,dist=target-start,t0=performance.now();
  const prevSnap=el.style.scrollSnapType;
  el.style.scrollSnapType='none';
  const ease=p=>1-Math.pow(1-p,3);
  const step=now=>{const p=Math.min(1,(now-t0)/dur);el.scrollLeft=start+dist*ease(p);if(p<1)_scrollRaf=requestAnimationFrame(step);else{_scrollRaf=0;el.style.scrollSnapType=prevSnap;}};
  _scrollRaf=requestAnimationFrame(step);
}
function readCar(){
  if(!_car) return;
  const cards=[..._car.querySelectorAll('[data-plan-id]')];
  if(!cards.length) return;
  const rect=_car.getBoundingClientRect();
  const padL=parseFloat(getComputedStyle(_car).scrollPaddingLeft)||0;
  const cur=_car.scrollLeft;
  let idx=0,best=Infinity;
  cards.forEach((c,i)=>{const t=cur+(c.getBoundingClientRect().left-rect.left)-padL;const d=Math.abs(t-cur);if(d<best){best=d;idx=i;}});
  const next={left:cur,max:_car.scrollWidth-_car.clientWidth,idx,n:cards.length,cw:_car.clientWidth,sw:_car.scrollWidth};
  const c=S.car;
  if(c.left===next.left&&c.max===next.max&&c.idx===next.idx&&c.n===next.n&&c.sw===next.sw&&c.cw===next.cw) return;
  S.car=next;updateArrows();updateRail();
}
function snapNearest(el){
  const cards=[...el.querySelectorAll('[data-plan-id]')];
  if(!cards.length){el.style.scrollSnapType='';return;}
  const rect=el.getBoundingClientRect();
  const padL=parseFloat(getComputedStyle(el).scrollPaddingLeft)||0;
  const cur=el.scrollLeft;
  let best=Infinity,bt=cur;
  cards.forEach(c=>{const t=cur+(c.getBoundingClientRect().left-rect.left)-padL;const d=Math.abs(t-cur);if(d<best){best=d;bt=t;}});
  smoothScrollX(el,bt,360);
}
function scrollCarousel(dir){
  if(!_car) return;
  const cards=[..._car.querySelectorAll('[data-plan-id]')];
  if(!cards.length) return;
  const rect=_car.getBoundingClientRect();
  const padL=parseFloat(getComputedStyle(_car).scrollPaddingLeft)||0;
  const cur=_car.scrollLeft;
  const targets=cards.map(c=>cur+(c.getBoundingClientRect().left-rect.left)-padL);
  let idx=0,best=Infinity;
  targets.forEach((t,i)=>{const d=Math.abs(t-cur);if(d<best){best=d;idx=i;}});
  const ni=Math.max(0,Math.min(cards.length-1,idx+dir));
  smoothScrollX(_car,targets[ni],420);
}

function makeCursor(d){return"url(\"data:image/svg+xml;utf8,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="46" height="46"><circle cx="23" cy="23" r="22" fill="white" stroke="#DADADA"/><path d="'+d+'" fill="none" stroke="#232323" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>')+"\") 23 23, pointer";}

/* ── Drag ────────────────────────────────────────────────────── */
let _edgeDir=0,_onDragMove,_onDragEnd;
function onDragStart(e){
  if(e.button!==undefined&&e.button!==0) return;
  if(!_car) return;
  const startX=e.clientX,startScroll=_car.scrollLeft;
  let moved=false;
  _car.style.scrollSnapType='none';
  _car.style.cursor='grabbing';
  document.body.style.userSelect='none';
  _onDragMove=ev=>{const d=ev.clientX-startX;if(Math.abs(d)>3) moved=true;_car.scrollLeft=startScroll-d;};
  _onDragEnd=()=>{
    window.removeEventListener('mousemove',_onDragMove);window.removeEventListener('mouseup',_onDragEnd);
    _onDragMove=null;_onDragEnd=null;
    _car.style.cursor=_edgeDir?(_edgeDir<0?_curL:_curR):'grab';
    document.body.style.userSelect='';
    if(moved){const sup=ce=>{ce.stopPropagation();ce.preventDefault();window.removeEventListener('click',sup,true);};window.addEventListener('click',sup,true);snapNearest(_car);}
    else{_car.style.scrollSnapType='';if(_edgeDir) scrollCarousel(_edgeDir);}
  };
  window.addEventListener('mousemove',_onDragMove);window.addEventListener('mouseup',_onDragEnd);
}
function onCarMove(e){
  if(!_car) return;
  const rect=_car.getBoundingClientRect();
  const zone=Math.min(170,rect.width*0.2);
  const x=e.clientX-rect.left;
  const canL=_car.scrollLeft>4,canR=_car.scrollLeft<_car.scrollWidth-_car.clientWidth-4;
  if(x<zone&&canL){_car.style.cursor=_curL;_edgeDir=-1;}
  else if(x>rect.width-zone&&canR){_car.style.cursor=_curR;_edgeDir=1;}
  else{_car.style.cursor='grab';_edgeDir=0;}
}
function onCarouselKey(e){
  const k=e.key;if(k!=='ArrowRight'&&k!=='ArrowLeft') return;
  if(!_car) return;
  e.preventDefault();
  const cards=[..._car.querySelectorAll('[data-plan-id]')];
  if(!cards.length) return;
  const rect=_car.getBoundingClientRect();
  const padL=parseFloat(getComputedStyle(_car).scrollPaddingLeft)||0;
  const cur=_car.scrollLeft;
  const targets=cards.map(c=>cur+(c.getBoundingClientRect().left-rect.left)-padL);
  let idx=0,best=Infinity;
  targets.forEach((t,i)=>{const d=Math.abs(t-cur);if(d<best){best=d;idx=i;}});
  const ni=Math.max(0,Math.min(cards.length-1,idx+(k==='ArrowRight'?1:-1)));
  smoothScrollX(_car,targets[ni],420);
}

/* ── Rail drag ──────────────────────────────────────────────── */
let _railDragging=false,_railMove,_railUp;
function onRailDown(e){
  const track=document.getElementById('rail-track');
  if(!track||!_car) return;
  const rect=track.getBoundingClientRect();
  const maxScroll=_car.scrollWidth-_car.clientWidth;
  if(maxScroll<=0) return;
  const visPct=Math.max(14,Math.min(100,_car.clientWidth/_car.scrollWidth*100));
  _railDragging=true;_car.style.scrollSnapType='none';
  if(_railThumb) _railThumb.style.transition='none';
  const seek=cx=>{const f=Math.min(1,Math.max(0,(cx-rect.left)/rect.width));_car.scrollLeft=f*maxScroll;if(_railThumb) _railThumb.style.left=(f*(100-visPct))+'%';};
  seek(e.clientX);
  _railMove=ev=>seek(ev.clientX);
  _railUp=()=>{window.removeEventListener('mousemove',_railMove);window.removeEventListener('mouseup',_railUp);_railDragging=false;_car.style.scrollSnapType='';if(_railThumb) _railThumb.style.transition='';readCar();};
  window.addEventListener('mousemove',_railMove);window.addEventListener('mouseup',_railUp);
  e.preventDefault();
}

/* ── Layout on resize ───────────────────────────────────────── */
let _resizeTimer,_lastW=window.innerWidth;
function onResize(){
  const w=window.innerWidth;
  // Ignore height-only changes (Safari toolbar show/hide on scroll fires
  // resize with the same width — rebuilding the shell would reset scroll).
  if(w===_lastW) return;
  _lastW=w;
  S.vw=w;
  clearTimeout(_resizeTimer);
  _resizeTimer=setTimeout(()=>{
    buildShell();cacheRefs();bindShellEvents();
    updateCarousel();updateAddonFilters();
    requestAnimationFrame(()=>positionThumb(false));
    setTimeout(()=>positionThumb(false),250);
  },60);
  positionThumb(true);
}

/* ── Update all ─────────────────────────────────────────────── */
function updateAll(){
  updateCarousel();updateAddonFilters();
  requestAnimationFrame(()=>positionThumb(false));
  setTimeout(()=>positionThumb(false),250);
  if(document.fonts&&document.fonts.ready) document.fonts.ready.then(()=>positionThumb(false));
}

/* ── Event delegation ───────────────────────────────────────── */
// Listeners bound to elements inside #root, which buildShell() recreates.
// Must be re-bound after every rebuild (init + resize).
function bindShellEvents(){
  // Fuel seg
  document.getElementById('fuel-seg')?.addEventListener('click',e=>{
    const b=e.target.closest('[data-fuel]');if(b) selectFuel(b.dataset.fuel);
  });
  // Addon filters
  document.getElementById('addon-filters')?.addEventListener('click',e=>{
    const l=e.target.closest('[data-addon]');if(l&&S.fuel!=='Gas') toggleAddon(l.dataset.addon);
  });
  // Carousel delegated
  if(_car){
    _car.addEventListener('click',e=>{
      if(_onDragMove) return;
      const m=e.target.closest('[data-modal]');if(m){openModal(m.dataset.modal);return;}
      const a=e.target.closest('[data-action]');
      if(a){
        const act=a.dataset.action;
        if(act==='toggle-rates') toggleRates();
        else if(act==='toggle-gas-rates') toggleGasRates();
        else if(act==='enter-address') searchAction();
      }
    });
    _car.addEventListener('scroll',()=>{if(_carRaf) return;_carRaf=requestAnimationFrame(()=>{_carRaf=0;readCar();});},{passive:true});
    _car.addEventListener('mousedown',onDragStart);
    _car.addEventListener('mousemove',onCarMove);
    _car.addEventListener('keydown',onCarouselKey);
  }
  // Arrows
  document.getElementById('btn-prev')?.addEventListener('click',()=>scrollCarousel(-1));
  document.getElementById('btn-next')?.addEventListener('click',()=>scrollCarousel(1));
  // Rail
  document.getElementById('rail-wrap')?.addEventListener('mousedown',onRailDown);
  // Search - mobile
  document.getElementById('sinput-m')?.addEventListener('focus',onSearchFocus);
  document.getElementById('sinput-m')?.addEventListener('input',onSearchInput);
  document.getElementById('sclear-m')?.addEventListener('click',clearSearch);
  document.getElementById('sbtn-m')?.addEventListener('click',searchAction);
  document.getElementById('search-row-m')?.addEventListener('click',e=>{if(!e.target.closest('input')&&!e.target.closest('[id^=sclear]')&&!e.target.closest('[id^=scheck]')) searchAction();});
  // Search - wide
  document.getElementById('sinput-w')?.addEventListener('focus',onSearchFocus);
  document.getElementById('sinput-w')?.addEventListener('input',onSearchInput);
  document.getElementById('sclear-w')?.addEventListener('click',clearSearch);
  document.getElementById('sbtn-w')?.addEventListener('click',searchAction);
  document.getElementById('search-row-w')?.addEventListener('click',e=>{if(!e.target.closest('input')&&!e.target.closest('[id^=sclear]')&&!e.target.closest('[id^=scheck]')) searchAction();});
}

// Listeners on document/window, which persist across rebuilds. Bound once.
function bindGlobalEvents(){
  // Suggestions
  document.addEventListener('click',e=>{
    const s=e.target.closest('[data-suggestion]');
    if(s) pickAddress(SUGGESTIONS[+s.dataset.suggestion]);
  });
  // Window
  window.addEventListener('resize',onResize,{passive:true});
  window.addEventListener('keydown',e=>{if(e.key==='Escape'&&S.activeModal&&!S.modalClosing) closeModal();});
}

/* ── Init ────────────────────────────────────────────────────── */
function init(){
  buildShell();
  cacheRefs();
  _curL=makeCursor('M26 15 L18 23 L26 31');
  _curR=makeCursor('M20 15 L28 23 L20 31');
  bindShellEvents();
  bindGlobalEvents();
  updateAll();
  updateSearch();
}

init();
})();
</script>
</body>
